name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '0 */6 * * *'   # Runs every 6 hours
  workflow_dispatch:          # Lets you trigger it manually too

jobs:
  wake-up:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          echo "Pinging app to keep it awake..."
          curl -s -o /dev/null -w "HTTP Status: %{http_code}" https://customer-churn-prediction-my-app.streamlit.app/ || true
          echo " — Done!"